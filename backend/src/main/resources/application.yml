server:
  port: 8080

spring:
  application:
    name: medlocator-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/medlocator_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: ${SQL_INIT_MODE:never}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Google APIs
google:
  places:
    api-key: ${GOOGLE_PLACES_API_KEY}

# OpenRouter configuration (for Medical Report Vision Analysis)
openrouter:
  api-key: ${OPENROUTER_API_KEY}
  model: "nvidia/nemotron-nano-12b-v2-vl:free"

# Groq configuration (for Symptom Checker Text Analysis)
groq:
  api-key: ${GROQ_API_KEY}

# JWT Security
jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForDevelopmentMustBeAtLeast32BytesLong}
  expiration: 86400000

# Supabase Storage (Free: 1GB storage, 2GB bandwidth/month)
supabase:
  url: ${SUPABASE_URL}
  service-key: ${SUPABASE_SERVICE_KEY}
  storage:
    bucket: ${SUPABASE_BUCKET:medical-reports}

spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 10MB

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.clinicai: INFO
    org.springframework.web: INFO

# Allowed CORS Origins (Comma separated)
app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
